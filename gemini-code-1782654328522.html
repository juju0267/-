<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณค่าก๊วนแบดมินตัน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #3498db;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .player-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn:hover { background-color: #2980b9; }
        .btn-add { background-color: #2ecc71; margin-top: 10px;}
        .btn-add:hover { background-color: #27ae60; }
        .btn-calc { background-color: #e67e22; font-size: 1.1em; margin-top: 20px;}
        .btn-calc:hover { background-color: #d35400; }
        .counter-btn {
            padding: 2px 8px;
            margin: 0 2px;
            cursor: pointer;
        }
        #resultTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        #resultTable th, #resultTable td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        #resultTable th { background-color: #2c3e50; color: white; }
        .line-summary-box {
            margin-top: 20px;
            background: #eef9f1;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #c3e6cb;
        }
        textarea {
            width: 100%;
            height: 120px;
            margin-top: 10px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 ระบบคิดเงินก๊วนแบดมินตัน</h1>
    
    <div class="section">
        <h2>1. ข้อมูลค่าใช้จ่ายส่วนกลาง</h2>
        <div class="grid-2">
            <div>
                <label>ราคาต่อคอร์ด (บาท):</label>
                <input type="number" id="courtPrice" value="200">
            </div>
            <div>
                <label>จำนวนคอร์ดที่จอง:</label>
                <input type="number" id="courtCount" value="3">
            </div>
            <div>
                <label>ราคาลูกขนไก่ต่อลูก (บาท):</label>
                <input type="number" id="shuttlePrice" value="60">
            </div>
            <div>
                <label>จำนวนลูกขนไก่ที่ใช้ (คอร์ด 3):</label>
                <input type="number" id="shuttleCount" value="0">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>2. รายชื่อผู้เล่นและจำนวนเกม (คอร์ด 3)</h2>
        <div class="player-row" style="font-weight: bold; border-bottom: 2px solid #333;">
            <div>ชื่อผู้เล่น</div>
            <div style="text-align: center;">จำนวนเกม (คอร์ด 3)</div>
            <div style="text-align: center;">เช่ารองเท้า (+50B)</div>
            <div>จัดการ</div>
        </div>
        <div id="playerContainer">
            </div>
        <button class="btn btn-add" onclick="addPlayerRow()">➕ เพิ่มผู้เล่น</button>
    </div>

    <button class="btn btn-calc" onclick="calculateExpenses()">🧮 คำนวณค่าใช้จ่ายทั้งหมด</button>

    <div class="section" id="resultSection" style="display:none;">
        <h2>3. สรุปยอดรวมรายคน</h2>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>ชื่อ</th>
                    <th>ค่าคอร์ด</th>
                    <th>ค่าลูกขนไก่</th>
                    <th>ค่ารองเท้า</th>
                    <th>ยอดสุทธิ</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>

        <div class="line-summary-box">
            <label>📋 ข้อความสำหรับก๊อปปี้ส่งเข้ากลุ่ม LINE:</label>
            <textarea id="lineSummaryText" readonly></textarea>
            <button class="btn" style="background-color: #27ae60; margin-top: 10px;" onclick="copyToClipboard()">Copy ข้อความ</button>
        </div>
    </div>
</div>

<script>
    // เพิ่มแถวผู้เล่นเริ่มต้นให้ 4 คนเพื่อความสะดวก
    window.onload = function() {
        for(let i=1; i<=4; i++) {
            addPlayerRow(`ผู้เล่น ${i}`);
        }
    }

    function addPlayerRow(defaultName = '') {
        const container = document.getElementById('playerContainer');
        const rowId = 'player_' + Date.now() + Math.random().toString(36).substr(2, 5);

        const rowHTML = `
            <div class="player-row" id="${rowId}">
                <div>
                    <input type="text" class="player-name" value="${defaultName}" placeholder="ชื่อผู้เล่น">
                </div>
                <div style="text-align: center;">
                    <button class="counter-btn" onclick="changeGameCount('${rowId}', -1)">-</button>
                    <input type="number" class="player-games" value="0" style="width: 50px; text-align: center;" min="0" readonly>
                    <button class="counter-btn" onclick="changeGameCount('${rowId}', 1)">+</button>
                </div>
                <div style="text-align: center;">
                    <input type="checkbox" class="player-shoes" style="transform: scale(1.3);">
                </div>
                <div>
                    <button class="btn" style="background-color: #e74c3c; padding: 5px 10px;" onclick="removePlayerRow('${rowId}')">ลบ</button>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', rowHTML);
    }

    function removePlayerRow(id) {
        document.getElementById(id).remove();
    }

    function changeGameCount(rowId, amount) {
        const row = document.getElementById(rowId);
        const input = row.querySelector('.player-games');
        let currentVal = parseInt(input.value) || 0;
        currentVal += amount;
        if(currentVal < 0) currentVal = 0;
        input.value = currentVal;
    }

    function calculateExpenses() {
        // 1. ดึงข้อมูลส่วนกลาง
        const courtPrice = parseFloat(document.getElementById('courtPrice').value) || 0;
        const courtCount = parseInt(document.getElementById('courtCount').value) || 0;
        const shuttlePrice = parseFloat(document.getElementById('shuttlePrice').value) || 0;
        const shuttleCount = parseInt(document.getElementById('shuttleCount').value) || 0;

        const totalCourtCost = courtPrice * courtCount;
        const totalShuttleCost = shuttlePrice * shuttleCount;

        // 2. ดึงข้อมูลผู้เล่นทั้งหมด
        const playerRows = document.querySelectorAll('.player-row:not([style*="font-weight"])');
        const totalPlayers = playerRows.length;

        if (totalPlayers === 0) {
            alert('กรุณาเพิ่มผู้เล่นอย่างน้อย 1 คนครับ');
            return;
        }

        // หาจำนวนเกมรวมทั้งหมดในคอร์ด 3
        let totalGamesInCourt3 = 0;
        playerRows.forEach(row => {
            totalGamesInCourt3 += parseInt(row.querySelector('.player-games').value) || 0;
        });

        // คำนวณค่าใช้จ่ายพื้นฐานต่อหน่วย
        const courtCostPerPerson = totalCourtCost / totalPlayers;
        const shuttleCostPerGame = totalGamesInCourt3 > 0 ? (totalShuttleCost / totalGamesInCourt3) : 0;

        // 3. คำนวณรายคนและแสดงผล
        const resultBody = document.getElementById('resultBody');
        resultBody.innerHTML = ''; // เคลียร์ตารางเก่า

        let lineText = `🏸 สรุปยอดค่าแบดมินตันวันนี้ครับ\n`;
        lineText += `---------------------------\n`;

        playerRows.forEach(row => {
            const name = row.querySelector('.player-name').value || 'ไม่ระบุชื่อ';
            const games = parseInt(row.querySelector('.player-games').value) || 0;
            const hasShoes = row.querySelector('.player-shoes').checked;

            const playerCourtCost = courtCostPerPerson;
            const playerShuttleCost = games * shuttleCostPerGame;
            const playerShoesCost = hasShoes ? 50 : 0; // ค่าเช่ารองเท้าคู่ละ 50 บาท
            const playerTotal = playerCourtCost + playerShuttleCost + playerShoesCost;

            // เพิ่มแถวในตารางสรุปบนเว็บ (ปัดเศษทศนิยม 2 ตำแหน่ง)
            const tr = `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td>${playerCourtCost.toFixed(2)} บ.</td>
                    <td>${playerShuttleCost.toFixed(2)} บ. (${games} เกม)</td>
                    <td>${playerShoesCost} บ.</td>
                    <td><strong style="color: #2c3e50;">${playerTotal.toFixed(2)} บ.</strong></td>
                </tr>
            `;
            resultBody.insertAdjacentHTML('beforeend', tr);

            // ต่อข้อความสำหรับส่ง LINE
            lineText += `• ${name}: ${playerTotal.toFixed(0)} บาท `;
            let details = [];
            if(playerShoesCost > 0) details.push(`ค่ารองเท้า ${playerShoesCost}`);
            if(games > 0) details.push(`คอร์ด3 ${games} เกม`);
            if(details.length > 0) lineText += `(${details.join(' + ')})`;
            lineText += `\n`;
        });

        lineText += `---------------------------\nขอบคุณทุกท่านครับ 🙏✨`;
        
        // แสดงพื้นที่ผลลัพธ์
        document.getElementById('lineSummaryText').value = lineText;
        document.getElementById('resultSection').style.display = 'block';
        
        // เลื่อนหน้าจอลงมาดูผลลัพธ์
        document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    }

    function copyToClipboard() {
        const textarea = document.getElementById('lineSummaryText');
        textarea.select();
        document.execCommand('copy');
        alert('คัดลอกข้อความสรุปเรียบร้อย! สามารถวางใน LINE ได้เลยครับ');
    }
</script>

</body>
</html>
